name: Build Eaglercraft JS + WASM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make scripts executable
      run: |
        chmod +x build_init.sh
        chmod +x build_make_workspace.sh
        chmod +x CompileLatestClient.sh
        chmod +x MakeWASMClientBundle.sh

    - name: Remove all previous build outputs (NO CACHING)
      run: |
        rm -rf mcp918/workspace
        rm -rf build
        rm -rf dist
        rm -rf web
        rm -rf out
        rm -rf tmp

    - name: Initialize build environment (fresh)
      run: ./build_init.sh

    - name: Generate workspace (fresh)
      run: ./build_make_workspace.sh

    - name: Build JavaScript client
      run: ./CompileLatestClient.sh

    - name: Build WASM-GC client
      run: ./MakeWASMClientBundle.sh

    - name: Upload JS client
      uses: actions/upload-artifact@v3
      with:
        name: eaglercraft-js-client
        path: |
          web/
          dist/
          *.html

    - name: Upload WASM-GC client
      uses: actions/upload-artifact@v3
      with:
        name: eaglercraft-wasm-client
        path: |
          wasm/
          wasm-out/
          *.wasm
          *.html
